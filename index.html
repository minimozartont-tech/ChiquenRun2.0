<!DOCTYPE html> 
<html lang="gl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Festival Run - Edición Concierto</title>  
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8e44ad">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta property="og:title" content="Festival Run - Edición Concierto">
    <meta property="og:image" content="icono_app.png">
    <meta property="og:type" content="website">

    <style>  
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }  
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 500px; aspect-ratio: 480 / 854; background: #000; overflow: hidden; }  
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }  

        #timer-display { position: absolute; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 8vh; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; }  
        
        .ui-box { position: absolute; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 8px 12px; border-radius: 12px; color: #fff; display: none; z-index: 10; font-size: 1.8vh; font-weight: bold; box-sizing: border-box; }
        
        #score-box { right: 15px; top: 15px; min-width: 120px; text-align: center; } 
        #lives-box { left: 15px; top: 15px; display: none; gap: 5px; z-index: 10; position: absolute; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 5px 8px; border-radius: 12px; align-items: center; }
        
        .fase2-ui { left: 50% !important; right: auto !important; transform: translateX(-50%); width: 160px; text-align: center !important; }
        #score-box.fase2-ui { top: 15px; }
        #gas-box.fase2-ui { top: 75px; } 
        
        .vida-slot { position: relative; width: 3.5vh; height: 3.5vh; background: rgba(255,255,255,0.1); border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        .vida-icon { width: 85%; height: auto; }
        .cross { position: absolute; inset: 0; color: #ff0000; font-size: 3.5vh; font-weight: bold; display: none; justify-content: center; align-items: center; line-height: 1; text-shadow: 1px 1px #000; }

        #selection { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: flex-start; color: white; z-index: 100; padding: 40px 20px; text-align: center; }  
        .option-container { display: flex; flex-direction: row; gap: 15px; justify-content: center; width: 100%; margin-top: auto; margin-bottom: 40px; }
        .veh-btn { border: 3px solid #ffff00; padding: 15px 5px; border-radius: 20px; background: rgba(255,255,0,0.1); color: #ffff00; font-weight: bold; flex: 1; text-align: center; font-size: 1.8vh; cursor: pointer; }
        .veh-btn img { height: 14vh; margin: 10px 0; object-fit: contain; }
        #screen-concierto { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; text-align: center; }
        .tutorial-overlay { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #000; z-index: 150; display: none; }  
        .video-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; object-fit: contain; }
    </style>
</head>  
<body>  

    <div id="game-container">
        <div id="tut1" class="tutorial-overlay" onclick="iniciarJuegoFase1()"></div>  
        <div id="tut2" class="tutorial-overlay" onclick="iniciarJuegoFase2()"></div>
        <div id="screen-concierto" onclick="mostrarTutorial2()">  
            <h1 style="color: #00ff00; font-size: 4vh;">🎸 TOCA AQUÍ 🎸</h1>  
            <p style="color:white">PARA CHEGAR AO CONCERTO</p>  
        </div>
        <div id="selection">  
            <div style="color: #8e44ad; font-weight: bold; font-size: 3.2vh; margin-top: 20px;">
                ESCOLLE O TEU VEHÍCULO<br>PARA CHEGAR AO...
                <div style="color:white; font-size: 5.5vh; margin-top: 20px; letter-spacing: 3px; font-weight: 900;">SIN CITY</div>
            </div>
            <div class="option-container">
                <div onclick="intentarSeleccion('moto')" class="veh-btn">MOTO<br><img src="motero.png"><br>CHUCHO</div>  
                <div onclick="intentarSeleccion('coche')" class="veh-btn">COCHE<br><img src="coche.png"><br>BOCHO</div>  
            </div>
        </div>  
        <div id="timer-display">50</div>  
        <div id="score-box" class="ui-box">PUNTOS: <span id="score">0</span></div>  
        <div id="gas-box" class="ui-box fase2-ui">GAS: <span id="gas-value">100</span>%</div>
        <div id="lives-box">
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-0" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-1" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-2" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-3" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-4" class="cross">X</div></div>
        </div>  
        <canvas id="gameCanvas"></canvas>  
    </div>

    <video id="video-fase1" class="video-overlay" playsinline muted></video>
    <video id="video-fase2" class="video-overlay" playsinline muted></video>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChiquenRun 2.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; background-image: url('fondoentero1.png'); background-size: cover; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Carga de tus imágenes reales
        const imgPollo = new Image(); imgPollo.src = 'pollo.png';
        const imgMalo = new Image(); imgMalo.src = 'malo1.png';
        const imgFondo = new Image(); imgFondo.src = 'fondoentero1.png';

        let score = 0;
        const player = { x: canvas.width/2, y: canvas.height - 100, w: 60, h: 60 };
        const enemies = [];

        function crearEnemigo() {
            enemies.push({ x: Math.random() * (canvas.width - 50), y: -50, w: 50, h: 50, speed: 4 });
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar fondo
            ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);

            // Dibujar Pollo
            ctx.drawImage(imgPollo, player.x, player.y, player.w, player.h);

            // Dibujar Enemigos
            enemies.forEach((enemy, i) => {
                enemy.y += enemy.speed;
                ctx.drawImage(imgMalo, enemy.x, enemy.y, enemy.w, enemy.h);
                
                // Colisión
                if (player.x < enemy.x + enemy.w && player.x + player.w > enemy.x &&
                    player.y < enemy.y + enemy.h && player.y + player.h > enemy.y) {
                    alert("¡Choque! Puntos: " + score);
                    location.reload();
                }
            });

            if (Math.random() < 0.02) crearEnemigo();
            requestAnimationFrame(loop);
        }

        canvas.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX - player.w/2;
        });

        imgFondo.onload = loop;
    </script>
</body>
</html>

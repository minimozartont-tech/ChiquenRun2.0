<!DOCTYPE html> 
<html lang="gl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Festival Run - Edición Concierto</title>  
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8e44ad">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta property="og:title" content="Festival Run - Edición Concierto">
    <meta property="og:image" content="icono_app.png">
    <meta property="og:type" content="website">

    <style>  
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }  
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 500px; aspect-ratio: 480 / 854; background: #000; overflow: hidden; z-index: 1; }  
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; position: relative; z-index: 5; }  

        #timer-display { position: absolute; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 8vh; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; }  
        
        .ui-box { position: absolute; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 8px 12px; border-radius: 12px; color: #fff; display: none; z-index: 10; font-size: 1.8vh; font-weight: bold; box-sizing: border-box; }
        
        #score-box { right: 15px; top: 15px; min-width: 120px; text-align: center; } 
        #lives-box { left: 15px; top: 15px; display: none; gap: 5px; z-index: 10; position: absolute; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 5px 8px; border-radius: 12px; align-items: center; }
        
        .fase2-ui { left: 50% !important; right: auto !important; transform: translateX(-50%); width: 160px; text-align: center !important; }
        #score-box.fase2-ui { top: 15px; }
        #gas-box.fase2-ui { top: 75px; } 
        
        .vida-slot { position: relative; width: 3.5vh; height: 3.5vh; background: rgba(255,255,255,0.1); border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        .vida-icon { width: 85%; height: auto; }
        .cross { position: absolute; inset: 0; color: #ff0000; font-size: 3.5vh; font-weight: bold; display: none; justify-content: center; align-items: center; line-height: 1; text-shadow: 1px 1px #000; }

        #selection { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: flex-start; color: white; z-index: 100; padding: 40px 20px; text-align: center; }  
        .option-container { display: flex; flex-direction: row; gap: 15px; justify-content: center; width: 100%; margin-top: auto; margin-bottom: 40px; }
        .veh-btn { border: 3px solid #ffff00; padding: 15px 5px; border-radius: 20px; background: rgba(255,255,0,0.1); color: #ffff00; font-weight: bold; flex: 1; text-align: center; font-size: 1.8vh; cursor: pointer; }
        .veh-btn img { height: 14vh; margin: 10px 0; object-fit: contain; }
        #screen-concierto { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; text-align: center; }
        .tutorial-overlay { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #000; z-index: 150; display: none; }  
        .video-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; object-fit: contain; }
        
        /* ESTILOS PARA PANTALLA DE HIGH SCORES */
        #high-scores-screen { position: absolute; inset: 0; background: linear-gradient(135deg, #1a0033 0%, #2d004d 100%); display: none; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 120; padding: 20px; text-align: center; overflow-y: auto; }
        #high-scores-screen h1 { color: #00ff00; font-size: 3.5vh; margin: 20px 0; text-shadow: 2px 2px #8e44ad; letter-spacing: 2px; }
        .scores-table { width: 95%; max-width: 450px; margin: 15px auto; }
        .score-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid #8e44ad; padding: 10px; margin: 5px 0; border-radius: 8px; color: #fff; font-size: 2.2vh; font-weight: bold; }
        .score-row.highlight { background: rgba(142,68,173,0.5); border-color: #00ff00; }
        .score-pos { color: #ffff00; min-width: 40px; }
        .score-name { flex: 1; text-align: left; margin-left: 15px; color: #00ff00; }
        .score-val { color: #ffff00; min-width: 80px; text-align: right; }
        
        #name-input-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 125; text-align: center; }
        #name-input-screen h2 { color: #00ff00; font-size: 2.8vh; margin-bottom: 30px; text-shadow: 2px 2px #8e44ad; }
        #name-input-screen p { color: #fff; font-size: 2vh; margin: 10px 0; }
        .letter-selector { display: flex; gap: 15px; justify-content: center; margin: 30px 0; }
        .letter-box { width: 70px; height: 70px; background: rgba(142,68,173,0.3); border: 2px solid #8e44ad; border-radius: 10px; color: #00ff00; font-size: 3.5vh; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .letter-box.active { background: #8e44ad; border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .arrow-btn { color: #fff; font-size: 2.5vh; font-weight: bold; cursor: pointer; user-select: none; margin: 0 10px; }
        .button-group { display: flex; gap: 15px; margin-top: 40px; justify-content: center; }
        .btn-save { background: #00ff00; color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-size: 2.2vh; font-weight: bold; cursor: pointer; }
        .btn-save:active { opacity: 0.7; }
        .btn-cancel { background: #ff0000; color: #fff; border: none; padding: 12px 30px; border-radius: 8px; font-size: 2.2vh; font-weight: bold; cursor: pointer; }
        .btn-cancel:active { opacity: 0.7; }
    </style>
</head>  
<body>  

    <div id="game-container">
        <div id="tut1" class="tutorial-overlay" onclick="iniciarJuegoFase1()"></div>  
        <div id="tut2" class="tutorial-overlay" onclick="iniciarJuegoFase2()"></div>
        <div id="screen-concierto" onclick="mostrarTutorial2()">  
            <h1 style="color: #00ff00; font-size: 4vh;">🎸 TOCA AQUÍ 🎸</h1>  
            <p style="color:white">PARA CHEGAR AO CONCERTO</p>  
        </div>
        <div id="selection">  
            <div style="color: #8e44ad; font-weight: bold; font-size: 3.2vh; margin-top: 20px;">
                ESCOLLE O TEU VEHÍCULO<br>PARA CHEGAR AO...
                <div style="color:white; font-size: 5.5vh; margin-top: 20px; letter-spacing: 3px; font-weight: 900;">SIN CITY</div>
            </div>
            <div class="option-container">
                <div onclick="intentarSeleccion('moto')" class="veh-btn">MOTO<br><img src="motero.png"><br>CHUCHO</div>  
                <div onclick="intentarSeleccion('coche')" class="veh-btn">COCHE<br><img src="coche.png"><br>BOCHO</div>  
            </div>
        </div>  
        <div id="timer-display">50</div>  
        <div id="score-box" class="ui-box">PUNTOS: <span id="score">0</span></div>  
        <div id="gas-box" class="ui-box fase2-ui">GAS: <span id="gas-value">100</span>%</div>
        <div id="lives-box">
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-0" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-1" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon"><div id="cross-2" class="cross">X</div></div>
        </div>
        
        <div id="high-scores-screen">
            <h1>🏆 HIGH SCORES 🏆</h1>
            <div class="scores-table" id="scores-table"></div>
            <button onclick="volverAlInicio()" style="margin-top: 30px; background: #8e44ad; color: #fff; border: 2px solid #00ff00; padding: 12px 30px; border-radius: 8px; font-size: 2.2vh; font-weight: bold; cursor: pointer;">VOLVER</button>
        </div>
        
        <div id="name-input-screen">
            <h2>¡PUNTUACIÓN TOP 10!</h2>
            <p>ESCRIBE TU NOMBRE (3 LETRAS)</p>
            <div class="letter-selector">
                <span class="arrow-btn" onclick="prevLetter(0)">◄</span>
                <div class="letter-box active" id="letter-0">A</div>
                <span class="arrow-btn" onclick="nextLetter(0)">►</span>
                <span class="arrow-btn" onclick="prevLetter(1)">◄</span>
                <div class="letter-box" id="letter-1">A</div>
                <span class="arrow-btn" onclick="nextLetter(1)">►</span>
                <span class="arrow-btn" onclick="prevLetter(2)">◄</span>
                <div class="letter-box" id="letter-2">A</div>
                <span class="arrow-btn" onclick="nextLetter(2)">►</span>
            </div>
            <p style="color: #8e44ad; font-size: 1.8vh;">Puntuación: <span id="final-score">0</span> puntos</p>
            <div class="button-group">
                <button class="btn-save" onclick="confirmarNombre()">GUARDAR</button>
                <button class="btn-cancel" onclick="cancelarNombre()">CANCELAR</button>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>  
    </div>

    <video id="video-fase1" class="video-overlay" playsinline muted></video>
    <video id="video-fase2" class="video-overlay" playsinline muted></video>

<script>  
    const canvas = document.getElementById('gameCanvas');  
    const ctx = canvas.getContext('2d');  
    const GW = 480, GH = 854; 
    canvas.width = GW; canvas.height = GH;

    const assets = {
        intro: 'intro.png', motero: 'motero.png', coche: 'coche.png', pollo: 'pollo.png', 
        guardia: 'guardia.png', pizza: 'pizza.png', muralla: 'muralla.png', vida: 'vida.png', 
        puente: 'puente.png', fondoF2: 'fondo_fase2.png', moteroF2: 'motero_fase2.png', 
        chucho: 'chucho.png', tutChucho: 'tutorial_chucho.png',
        comida: 'comida.png', bueno: 'bueno.png', malo1: 'malo1.png', malo2: 'malo2.png', veneno: 'veneno.png'
    };
    const imgs = {};
    for (let k in assets) { imgs[k] = new Image(); imgs[k].src = assets[k]; }

    const audio = {
        crash: new Audio('choque.mp3'), point: new Audio('sonido_pollo.mp3'),
        bueno: new Audio('sonido_bueno.mp3'), malo: new Audio('sonido_malo.wav'),
        bg1: null, bg2: null
    };

    let estado = 'INICIO', vehiculo = 'motero', score = 0, vidas = 5, tiempo = 50;
    let scrollY = 0, carril = 1, obstaculos = [], itemsF2 = [], gas = 100, framesF2 = 0;
    let modoPuente = false, frameParpadeo = 0, f1Finalizado = false;
    let seleccionHabilitada = false;
    const player = { x: GW/2, y: GH-250, w: 120, h: 160, vy: 0, saltos: 0, speedOut: 0 };

    // VARIABLES PARA HIGH SCORES
    let highScores = [];
    let currentLetters = ['A', 'A', 'A'];
    let selectedLetterIndex = 0;
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    // CARGAR HIGH SCORES AL INICIAR
    function cargarHighScores() {
        const stored = localStorage.getItem('festivalRunScores');
        if (stored) {
            highScores = JSON.parse(stored);
        } else {
            highScores = [];
        }
    }

    // GUARDAR HIGH SCORES
    function guardarHighScores() {
        localStorage.setItem('festivalRunScores', JSON.stringify(highScores));
    }

    // MOSTRAR PANTALLA DE HIGH SCORES
    function mostrarHighScores() {
        cargarHighScores();
        const tabla = document.getElementById('scores-table');
        tabla.innerHTML = '';
        
        for (let i = 0; i < 10; i++) {
            const row = document.createElement('div');
            row.className = 'score-row';
            if (highScores[i]) {
                row.innerHTML = `
                    <span class="score-pos">#${i + 1}</span>
                    <span class="score-name">${highScores[i].name}</span>
                    <span class="score-val">${highScores[i].points}</span>
                `;
            } else {
                row.innerHTML = `
                    <span class="score-pos">#${i + 1}</span>
                    <span class="score-name">---</span>
                    <span class="score-val">0</span>
                `;
            }
            tabla.appendChild(row);
        }
        
        document.getElementById('high-scores-screen').style.display = 'flex';
    }

    // COMPROBAR SI PUNTUACIÓN ES TOP 10
    function esTopTen(puntos) {
        cargarHighScores();
        if (highScores.length < 10) return true;
        return puntos > highScores[9].points;
    }

    // MOSTRAR PANTALLA DE ENTRADA DE NOMBRE
    function mostrarPantallaEntrada() {
        document.getElementById('name-input-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        currentLetters = ['A', 'A', 'A'];
        selectedLetterIndex = 0;
        actualizarLetrasUI();
    }

    // ACTUALIZAR UI DE LETRAS
    function actualizarLetrasUI() {
        for (let i = 0; i < 3; i++) {
            const box = document.getElementById(`letter-${i}`);
            box.innerText = currentLetters[i];
            box.classList.toggle('active', i === selectedLetterIndex);
        }
    }

    // SIGUIENTE LETRA
    function nextLetter(index) {
        const posActual = LETTERS.indexOf(currentLetters[index]);
        currentLetters[index] = LETTERS[(posActual + 1) % LETTERS.length];
        actualizarLetrasUI();
    }

    // LETRA ANTERIOR
    function prevLetter(index) {
        const posActual = LETTERS.indexOf(currentLetters[index]);
        currentLetters[index] = LETTERS[(posActual - 1 + LETTERS.length) % LETTERS.length];
        actualizarLetrasUI();
    }

    // CONFIRMAR NOMBRE
    function confirmarNombre() {
        const nombre = currentLetters.join('');
        const nuevoScore = { name: nombre, points: score };
        
        cargarHighScores();
        highScores.push(nuevoScore);
        highScores.sort((a, b) => b.points - a.points);
        highScores = highScores.slice(0, 10);
        guardarHighScores();
        
        document.getElementById('name-input-screen').style.display = 'none';
        mostrarHighScores();
    }

    // CANCELAR ENTRADA
    function cancelarNombre() {
        document.getElementById('name-input-screen').style.display = 'none';
        mostrarHighScores();
    }

    // VOLVER AL INICIO
    function volverAlInicio() {
        document.getElementById('high-scores-screen').style.display = 'none';
        document.getElementById('name-input-screen').style.display = 'none';
        canvas.style.display = 'block';
        estado = 'INICIO';
        score = 0;
        vidas = 5;
        tiempo = 50;
        scrollY = 0;
        carril = 1;
        obstaculos = [];
        itemsF2 = [];
        gas = 100;
        framesF2 = 0;
        modoPuente = false;
        frameParpadeo = 0;
        f1Finalizado = false;
        player.x = GW/2;
        player.y = GH-250;
        player.vy = 0;
        player.saltos = 0;
        player.speedOut = 0;
        document.getElementById('score').innerText = '0';
        document.getElementById('timer-display').style.display = 'none';
        if (audio.bg1) { audio.bg1.pause(); audio.bg1 = null; }
        if (audio.bg2) { audio.bg2.pause(); audio.bg2 = null; }
    }

    function fadeOutAudio(audioElement, duration = 2000) {
        if (!audioElement) return;
        const startVolume = audioElement.volume;
        const steps = 20;
        const interval = duration / steps;
        const stepValue = startVolume / steps;
        const fade = setInterval(() => {
            if (audioElement.volume > stepValue) { audioElement.volume -= stepValue; } 
            else { audioElement.volume = 0; audioElement.pause(); clearInterval(fade); }
        }, interval);
    }

    function actualizarVidasUI() {
        for(let i=0; i<3; i++) {
            document.getElementById(`cross-${i}`).style.display = (i >= vidas) ? 'flex' : 'none';
        }
    }

    window.intentarSeleccion = function(v) {
        if (!seleccionHabilitada) return;
        mostrarTut1(v);
    }

    function mostrarTut1(v) {
        if (v === 'moto') {
            vehiculo = 'motero';
            audio.bg1 = new Audio('musica_chucho.mp3');
            audio.bg2 = new Audio('musica_fondo.mp3');
        } else {
            vehiculo = 'coche';
            audio.bg1 = new Audio('musica_juego.mp3');
            audio.bg2 = new Audio('musica_albweto.mp3');
        }
        document.getElementById('selection').style.display = 'none';
        const tut = document.getElementById('tut1');
        tut.style.backgroundImage = `url('tutorial_fase1_${v}.png')`;
        tut.style.display = 'block';
        estado = 'TUTORIAL1';
    }

    window.iniciarJuegoFase1 = function() {
        document.getElementById('tut1').style.display = 'none';
        const timer = document.getElementById('timer-display');
        timer.style.top = '10%'; timer.style.display = 'block';
        document.getElementById('score-box').classList.remove('fase2-ui'); 
        document.getElementById('score-box').style.display = 'block';
        document.getElementById('lives-box').style.display = 'flex';
        document.getElementById('gas-box').style.display = 'none';
        tiempo = 50; f1Finalizado = false; modoPuente = false; carril = 1;
        audio.bg1.volume = 1; audio.bg1.loop = true; audio.bg1.play();
        actualizarVidasUI();
        estado = 'JUGANDO_F1';
    }

    function loop() {
        ctx.clearRect(0, 0, GW, GH);
        if (estado === 'INICIO') { if(imgs.intro.complete) ctx.drawImage(imgs.intro, 0, 0, GW, GH); }

        if (estado === 'JUGANDO_F1') {
            if (tiempo > 0) scrollY = (scrollY + 14) % GH;
            const bg = modoPuente ? imgs.puente : imgs.muralla;
            ctx.drawImage(bg, 0, scrollY - GH, GW, GH); ctx.drawImage(bg, 0, scrollY, GW, GH);

            let destinoX = (GW/3)*carril + (GW/6) - player.w/2;
            if (tiempo <= 0) {
                carril = 1; 
                player.x += (destinoX - player.x) * 0.08;
                if(Math.abs(player.x - destinoX) < 10) {
                    player.speedOut += 0.4;
                    player.y -= player.speedOut;
                }
                if (player.y < -player.h && !f1Finalizado) {
                    f1Finalizado = true;
                    setTimeout(finalizarFase1, 800);
                }
            } else {
                player.x += (destinoX - player.x) * 0.25;
            }

            if (frameParpadeo > 0) { frameParpadeo--; if (Math.floor(frameParpadeo / 5) % 2 === 0) ctx.globalAlpha = 0.3; }
            ctx.drawImage(imgs[vehiculo], player.x, player.y, player.w, player.h); ctx.globalAlpha = 1.0;

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                let o = obstaculos[i]; 
                if (tiempo > 0) o.y += 13;
                let tam = (o.tipo === 'guardia') ? 150 : 110;
                ctx.drawImage(imgs[o.tipo], o.x, o.y, tam, tam);
                if (tiempo > 0 && player.x < o.x+tam-30 && player.x+player.w > o.x+30 && player.y < o.y+tam-30 && player.y+player.h > o.y+30) {
                    if(o.tipo === 'pollo') { 
                        score += 100;

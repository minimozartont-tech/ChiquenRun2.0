<!DOCTYPE html> 
<html lang="gl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
    <title>ChiquenRun 2.0</title>  
    <style>  
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: Arial, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }  
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 480px; aspect-ratio: 480 / 854; background: #000; overflow: hidden; }  
        canvas { display: block; width: 100%; height: 100%; }  
        #timer-display { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 8vh; font-weight: bold; text-shadow: 2px 2px #000; display: none; z-index: 10; }  
        .ui-box { position: absolute; bottom: 3%; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 10px; border-radius: 12px; color: #fff; display: none; z-index: 10; font-size: 1.8vh; min-width: 90px; text-align: center; }
        #score-box { left: 5%; } #gas-box { right: 5%; } 
        #lives-box { position: absolute; bottom: 3%; right: 5%; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 5px; border-radius: 10px; display: none; gap: 5px; z-index: 10; }  
        .vida-icon { width: 3.5vh; height: auto; }
        #selection { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; z-index: 100; padding: 20px; }  
        .option-container { display: flex; gap: 15px; width: 100%; margin-top: auto; margin-bottom: 30px; }
        .veh-btn { border: 3px solid #ffff00; padding: 15px; border-radius: 20px; background: rgba(255,255,0,0.1); color: #ffff00; font-weight: bold; flex: 1; text-align: center; }
        .veh-btn img { width: 100%; max-height: 15vh; object-fit: contain; margin-top: 10px; }
        .tutorial-overlay { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #000; z-index: 150; display: none; }  
        .video-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; object-fit: contain; }
        #screen-concierto { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; }
    </style>
</head>  
<body>  
    <div id="game-container">
        <div id="tut1" class="tutorial-overlay" onclick="iniciarJuegoFase1()"></div>  
        <div id="tut2" class="tutorial-overlay" onclick="iniciarJuegoFase2()"></div>
        <div id="screen-concierto" onclick="mostrarTutorial2()">
            <h1 style="color: #00ff00; font-size: 4vh; text-align: center;">🎸 TOCA PARA<br>IR AO CONCERTO 🎸</h1>
        </div>
        <div id="selection">  
            <h2 style="color:#8e44ad; text-align:center;">ESCOLLE VEHÍCULO</h2>
            <div class="option-container">
                <div onclick="mostrarTut1('moto')" class="veh-btn">MOTO<br><img src="motero.png"></div>  
                <div onclick="mostrarTut1('coche')" class="veh-btn">COCHE<br><img src="coche.png"></div>  
            </div>
        </div>  
        <div id="timer-display">50</div>  
        <div id="score-box" class="ui-box">PUNTOS: <span id="score">0</span></div>  
        <div id="gas-box" class="ui-box">GAS: <span id="gas-value">100</span>%</div>
        <div id="lives-box"></div>  
        <canvas id="gameCanvas"></canvas>  
    </div>
    <video id="video-fase1" class="video-overlay" playsinline muted></video>
    <video id="video-fase2" class="video-overlay" playsinline muted src="concierto.mp4"></video>
<script>  
    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d', { alpha: false });
    const GW = 480, GH = 854; canvas.width = GW; canvas.height = GH;
    const assets = { intro: 'intro.png', motero: 'motero.png', coche: 'coche.png', pollo: 'pollo.png', guardia: 'guardia.png', pizza: 'pizza.png', muralla: 'muralla.png', vida: 'vida.png', puente: 'puente.png', fondoF2: 'fondoentero.png', moteroF2: 'motero_fase2.png', comida: 'comida.png', bueno: 'bueno.png', malo1: 'malo1.png', malo2: 'malo2.png', veneno: 'veneno.png' };
    const imgs = {}; for (let k in assets) { imgs[k] = new Image(); imgs[k].src = assets[k]; }
    const audio = { bg1: new Audio('musica_juego.mp3'), bg2: new Audio('musica_fondo.mp3'), crash: new Audio('choque.mp3'), point: new Audio('sonido_pollo.mp3'), bueno: new Audio('sonido_bueno.mp3'), malo: new Audio('sonido_malo.wav') };
    let state = 'INICIO', veh = 'motero', score = 0, lives = 3, time = 50, scrollY = 0, lane = 1, obstacles = [], itemsF2 = [], gas = 100, f2Frames = 0, isBridge = false, blink = 0;
    const p = { x: GW/2, y: GH-200, w: 120, h: 160, vy: 0, jumps: 0 };
    function fadeOut(a) { if(!a) return; let v = 1; let it = setInterval(() => { v -= 0.1; if(v <= 0) { a.pause(); clearInterval(it); } else { a.volume = v; } }, 100); }
    function updateLives() { const b = document.getElementById('lives-box'); b.innerHTML = ''; for(let i=0; i<lives; i++) b.innerHTML += `<img src="vida.png" class="vida-icon">`; }
    window.mostrarTut1 = (v) => { veh = v === 'moto' ? 'motero' : 'coche'; document.getElementById('selection').style.display='none'; const t = document.getElementById('tut1'); t.style.backgroundImage = `url('tutorial_fase1_${v}.png')`; t.style.display = 'block'; state = 'TUT1'; };
    window.iniciarJuegoFase1 = () => { document.getElementById('tut1').style.display='none'; document.getElementById('timer-display').style.display='block'; document.getElementById('score-box').style.display='block'; document.getElementById('lives-box').style.display='flex'; audio.bg1.loop = true; audio.bg1.play(); updateLives(); state = 'F1'; };
    function endF1() { state = 'V1'; document.getElementById('timer-display').style.display='none'; const v = document.getElementById('video-fase1'); v.src = veh === 'motero' ? 'moto_final.mp4' : 'coche_final.mp4'; v.style.display = 'block'; v.play(); v.onended = () => { v.style.display='none'; document.getElementById('screen-concierto').style.display='flex'; }; setTimeout(() => fadeOut(audio.bg1), 2000); }
    window.mostrarTutorial2 = () => { document.getElementById('screen-concierto').style.display='none'; document.getElementById('tut2').style.display='block'; document.getElementById('tut2').style.backgroundImage = "url('tutorial_fase2.png')"; };
    window.iniciarJuegoFase2 = () => { document.getElementById('tut2').style.display='none'; document.getElementById('lives-box').style.display='none'; document.getElementById('gas-box').style.display='block'; gas = 100; time = 50; f2Frames = 0; itemsF2 = []; p.x = 80; p.y = GH*0.7; audio.bg2.loop = true; audio.bg2.play(); const total = 80; const step = 6000/total; for(let i=0; i<total; i++) { let r = Math.random(), t='malo', im=imgs.malo1, w=80, h=80; if(i===40){ t='comida'; im=imgs.comida; } else if(r<0.2){ t='pollo'; im=imgs.pollo; } else if(r<0.4){ t='bueno'; im=imgs.bueno; w=140; h=70; } itemsF2.push({ f: (i+1)*step, x: GW+200, yB: [20,165,315][Math.floor(Math.random()*3)], tipo: t, img: im, w, h, rec: false }); } state = 'F2'; };
    function loop() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,GW,GH);
        if(state === 'INICIO' && imgs.intro.complete) ctx.drawImage(imgs.intro, 0,0,GW,GH);
        if(state === 'F1') {
            scrollY = (scrollY + 9) % GH; const bg = isBridge ? imgs.puente : imgs.muralla; ctx.drawImage(bg, 0, scrollY-GH, GW, GH); ctx.drawImage(bg, 0, scrollY, GW, GH);
            p.x += (((GW/3)*lane + (GW/6)-p.w/2) - p.x) * 0.2;
            if(blink > 0){ blink--; if(Math.floor(blink/5)%2===0) ctx.globalAlpha = 0.3; }
            ctx.drawImage(imgs[veh], p.x, p.y, p.w, p.h); ctx.globalAlpha = 1.0;
            for(let i=obstacles.length-1; i>=0; i--) {
                let o = obstacles[i]; o.y += 9; let s = o.t === 'guardia' ? 150 : 110; ctx.drawImage(imgs[o.t], o.x, o.y, s, s);
                if(p.x < o.x+s-30 && p.x+p.w > o.x+30 && p.y < o.y+s-30 && p.y+p.h > o.y+30) { if(o.t==='pollo'){ score+=100; audio.point.play(); document.getElementById('score').innerText=score; } else { lives--; audio.crash.play(); blink=40; updateLives(); if(lives<=0) location.reload(); } obstacles.splice(i,1); }
            }
            time -= 1/60; document.getElementById('timer-display').innerText = Math.ceil(Math.max(0,time)); if(time <= 5) isBridge = true; if(time <= 0) endF1();
        }
        if(state === 'F2') {
            let prog = Math.min(1, f2Frames/6000); f2Frames++; time = 50 - (prog*50); document.getElementById('timer-display').innerText = Math.ceil(Math.max(0,time));
            const altJ = GH*0.45, marg = (GH-altJ)/2; if(imgs.fondoF2.complete) { let aF = altJ * (imgs.fondoF2.width/imgs.fondoF2.height); ctx.drawImage(imgs.fondoF2, -(prog*(aF-GW)), marg, aF, altJ); }
            ctx.fillStyle="#000"; ctx.fillRect(0,0,GW,marg); ctx.fillRect(0,marg+altJ,GW,GH);
            itemsF2.forEach(it => { if(!it.rec && f2Frames >= it.f-180) { it.x -= 6; let yP = (marg+altJ)-it.h-it.yB; ctx.drawImage(it.img, it.x, yP, it.w, it.h); if(p.x < it.x+it.w-20 && p.x+100 > it.x+20 && p.y < yP+it.h-20 && p.y+160 > yP+20) { it.rec=true; if(it.tipo==='bueno'){ gas=Math.min(100, gas+15); audio.bueno.play(); } else { gas-=10; audio.malo.play(); } document.getElementById('gas-value').innerText = Math.floor(gas); } } });
            p.vy += 0.7; p.y += p.vy; let suelo = (marg+altJ)-160; if(p.y > suelo){ p.y = suelo; p.vy = 0; p.jumps = 0; }
            ctx.drawImage(imgs.moteroF2, p.x, p.y, 100, 160); if(gas <= 0) location.reload();
            if(prog>=1){ state='V2'; document.getElementById('video-fase2').style.display='block'; document.getElementById('video-fase2').play(); }
        }
        requestAnimationFrame(loop);
    }
    window.addEventListener('touchstart', (e) => { if(state==='INICIO'){ document.getElementById('selection').style.display='flex'; state='SEL'; } else if(state==='F1'){ if(e.touches[0].clientX < window.innerWidth/2){ if(lane>0) lane--; } else { if(lane<2) lane++; } } else if(state==='F2'){ if(p.jumps<2){ p.vy = -15; p.jumps++; } } });
    setInterval(() => { if(state==='F1' && !isBridge){ let t = Math.random()<0.2 ? 'pollo' : 'guardia'; obstacles.push({ x: (GW/3)*Math.floor(Math.random()*3) + (GW/6)-60, y: -150, t: t }); } }, 900);
    loop();
</script>  
</body>  
</html>

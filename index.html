<!DOCTYPE html> 
<html lang="gl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Festival Run - Edición Concierto</title>  
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8e44ad">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <meta property="og:title" content="Festival Run - Edición Concierto">
    <meta property="og:image" content="icono_app.png">
    <meta property="og:type" content="website">

    <style>  
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }  
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 500px; aspect-ratio: 480 / 854; background: #000; overflow: hidden; }  
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; background: #111; }  

        #timer-display { position: absolute; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 8vh; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; }  
        
        .ui-box { position: absolute; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 8px 12px; border-radius: 12px; color: #fff; display: none; z-index: 10; font-size: 1.8vh; font-weight: bold; box-sizing: border-box; }
        
        #score-box { right: 15px; top: 15px; min-width: 120px; text-align: center; } 
        #lives-box { left: 15px; top: 15px; display: none; gap: 5px; z-index: 10; position: absolute; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 5px 8px; border-radius: 12px; align-items: center; }
        
        .fase2-ui { left: 50% !important; right: auto !important; transform: translateX(-50%); width: 160px; text-align: center !important; }
        #score-box.fase2-ui { top: 15px; }
        #gas-box.fase2-ui { top: 75px; } 
        
        .vida-slot { position: relative; width: 3.5vh; height: 3.5vh; background: rgba(255,255,255,0.1); border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        .vida-icon { width: 85%; height: auto; }
        .cross { position: absolute; inset: 0; color: #ff0000; font-size: 3.5vh; font-weight: bold; display: none; justify-content: center; align-items: center; line-height: 1; text-shadow: 1px 1px #000; }

        #selection { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: flex-start; color: white; z-index: 100; padding: 40px 20px; text-align: center; }  
        .option-container { display: flex; flex-direction: row; gap: 15px; justify-content: center; width: 100%; margin-top: auto; margin-bottom: 40px; }
        .veh-btn { border: 3px solid #ffff00; padding: 15px 5px; border-radius: 20px; background: rgba(255,255,0,0.1); color: #ffff00; font-weight: bold; flex: 1; text-align: center; font-size: 1.8vh; cursor: pointer; }
        .veh-btn img { height: 14vh; margin: 10px 0; object-fit: contain; }
        #screen-concierto { position: absolute; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; text-align: center; }
        .tutorial-overlay { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #000; z-index: 150; display: none; }  
        .video-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; object-fit: contain; }

        /* INTERFACES DE PUNTUACIONES */
        .full-screen-ui { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; padding: 20px; text-align: center; box-sizing: border-box; }
        .ranking-table { width: 85%; margin: 20px 0; font-size: 2.2vh; border-collapse: collapse; }
        .ranking-table tr { border-bottom: 1px solid rgba(142, 68, 173, 0.4); }
        .ranking-table td { padding: 10px 5px; font-weight: bold; }
        .btn-ui { background: #8e44ad; border: 2px solid #ffff00; color: white; padding: 12px 30px; font-size: 2.2vh; font-weight: bold; border-radius: 25px; margin-top: 15px; cursor: pointer; box-shadow: 0 0 15px #8e44ad; }
        .input-name { background: #222; border: 3px solid #8e44ad; color: #ffff00; font-size: 5vh; text-align: center; width: 160px; border-radius: 10px; font-weight: bold; text-transform: uppercase; margin: 20px 0; letter-spacing: 5px; }
    </style>
</head>  
<body>  

    <div id="game-container">
        <div id="screen-leaderboard" class="full-screen-ui">
            <h2 style="color: #ffff00; font-size: 4vh; margin: 0; text-shadow: 2px 2px #8e44ad;">TOP 10 MELLORES</h2>
            <table class="ranking-table" id="leaderboard-table"></table>
            <button class="btn-ui" onclick="irASeleccion()">XOGAR</button>
        </div>

        <div id="screen-gameover" class="full-screen-ui">
            <h1 id="go-title" style="color: #ff0000; font-size: 4.5vh; margin: 0;">FIN DO XOGO</h1>
            <p id="go-rank-msg" style="font-size: 2.5vh; color: #fff; margin: 15px 0 5px 0;"></p>
            <h2 style="color: #ffff00; font-size: 5vh; margin: 0;" id="go-score">0 PTS</h2>
            
            <div id="container-registro" style="display:none; flex-direction:column; align-items:center;">
                <p style="color: #aaa; margin: 15px 0 0 0; font-size: 1.8vh;">INTRODUCE AS TÚAS INICIAIS (3 LETRAS):</p>
                <input type="text" id="player-name" class="input-name" maxlength="3" value="AAA" oninput="this.value = this.value.toUpperCase()">
            </div>
            
            <button class="btn-ui" id="btn-go-action" onclick="guardarYReiniciar()">CONTINUAR</button>
        </div>

        <div id="tut1" class="tutorial-overlay" onclick="iniciarJuegoFase1()"></div>  
        <div id="tut2" class="tutorial-overlay" onclick="iniciarJuegoFase2()"></div>
        <div id="screen-concierto" onclick="mostrarTutorial2()">  
            <h1 style="color: #00ff00; font-size: 4vh;">🎸 TOCA AQUÍ 🎸</h1>  
            <p style="color:white">PARA CHEGAR AO CONCERTO</p>  
        </div>
        <div id="selection">  
            <div style="color: #8e44ad; font-weight: bold; font-size: 3.2vh; margin-top: 20px;">
                ESCOLLE O TEU VEHÍCULO<br>PARA CHEGAR AO...
                <div style="color:white; font-size: 5.5vh; margin-top: 20px; letter-spacing: 3px; font-weight: 900;">SIN CITY</div>
            </div>
            <div class="option-container">
                <div onclick="intentarSeleccion('moto')" class="veh-btn">MOTO<br><img id="img-btn-moto" src="motero.png" alt="moto"><br>CHUCHO</div>  
                <div onclick="intentarSeleccion('coche')" class="veh-btn">COCHE<br><img id="img-btn-coche" src="coche.png" alt="coche"><br>BOCHO</div>  
            </div>
        </div>  
        <div id="timer-display">50</div>  
        <div id="score-box" class="ui-box">PUNTOS: <span id="score">0</span></div>  
        <div id="gas-box" class="ui-box fase2-ui">GAS: <span id="gas-value">100</span>%</div>
        <div id="lives-box">
            <div class="vida-slot"><img src="vida.png" class="vida-icon" onerror="this.style.display='none'"><div id="cross-0" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon" onerror="this.style.display='none'"><div id="cross-1" class="cross">X</div></div>
            <div class="vida-slot"><img src="vida.png" class="vida-icon" onerror="this.style.display='none'"><div id="cross-2" class="cross">X</div></div>
        </div>  
        <canvas id="gameCanvas"></canvas>  
    </div>

    <video id="video-fase1" class="video-overlay" playsinline muted></video>
    <video id="video-fase2" class="video-overlay" playsinline muted></video>

<script>  
    // --- CONTROLADOR DE ERRORES VISUAL ---
    window.onerror = function(message, source, lineno) {
        const errContainer = document.createElement('div');
        errContainer.style = "position:absolute; top:0; left:0; width:100%; background:rgba(255,0,0,0.9); color:white; z-index:99999; padding:10px; font-family:monospace; font-size:12px; box-sizing:border-box;";
        errContainer.innerHTML = `<strong>Erro detectado:</strong> ${message}<br><strong>Liña:</strong> ${lineno}`;
        document.body.appendChild(errContainer);
        return false;
    };

    const canvas = document.getElementById('gameCanvas');  
    const ctx = canvas.getContext('2d');  
    const GW = 480, GH = 854; 
    canvas.width = GW; canvas.height = GH;

    // Precarga segura de imágenes (si fallan, conservan su estado para no romper el canvas)
    const assets = {
        intro: 'intro.png', motero: 'motero.png', coche: 'coche.png', pollo: 'pollo.png', 
        guardia: 'guardia.png', pizza: 'pizza.png', muralla: 'muralla.png', vida: 'vida.png', 
        puente: 'puente.png', fondoF2: 'fondo_fase2.png', moteroF2: 'motero_fase2.png', 
        chucho: 'chucho.png', tutChucho: 'tutorial_chucho.png',
        comida: 'comida.png', bueno: 'bueno.png', malo1: 'malo1.png', malo2: 'malo2.png', veneno: 'veneno.png'
    };
    const imgs = {};
    for (let k in assets) { 
        imgs[k] = new Image(); 
        imgs[k].src = assets[k]; 
    }

    // Carga segura de audios (encapsulados para que si el navegador los bloquea, no se pare el juego)
    function crearAudioSeguro(ruta) {
        try {
            let a = new Audio(ruta);
            a.onerror = () => console.log("Non se puido cargar o audio: " + ruta);
            return a;
        } catch(e) {
            return { play: function(){}, pause: function(){}, currentTime: 0 };
        }
    }

    const audio = {
        crash: crearAudioSeguro('choque.mp3'), 
        point: crearAudioSeguro('sonido_pollo.mp3'),
        bueno: crearAudioSeguro('sonido_bueno.mp3'), 
        malo: crearAudioSeguro('sonido_malo.wav'),
        bg1: null, bg2: null
    };

    let estado = 'INICIO', vehiculo = 'motero', score = 0, vidas = 3, tiempo = 50;
    let scrollY = 0, carril = 1, obstaculos = [], itemsF2 = [], gas = 100, framesF2 = 0;
    let modoPuente = false, frameParpadeo = 0, f1Finalizado = false;
    let seleccionHabilitada = false;
    const player = { x: GW/2, y: GH-250, w: 120, h: 160, vy: 0, saltos: 0, speedOut: 0 };

    // Dibuja una imagen o un rectángulo de color si la imagen no existe/no ha cargado
    function drawAsset(imgObject, x, y, w, h, fallbackColor = "#ff00ff") {
        if (imgObject && imgObject.complete && imgObject.naturalWidth !== 0) {
            ctx.drawImage(imgObject, x, y, w, h);
        } else {
            ctx.fillStyle = fallbackColor;
            ctx.fillRect(x, y, w, h);
        }
    }

    function obtenerPuntuaciones() {
        let porDefecto = [
            {name: "BOCH", score: 2500}, {name: "CHUC", score: 2000}, {name: "FER", score: 1800},
            {name: "ANX", score: 1500}, {name: "ALB", score: 1200}, {name: "XUR", score: 1000},
            {name: "GAB", score: 800}, {name: "ROB", score: 600}, {name: "LUA", score: 400}, {name: "ELI", score: 200}
        ];
        try {
            let lista = localStorage.getItem('festival_run_scores');
            if (lista) return JSON.parse(lista);
            localStorage.setItem('festival_run_scores', JSON.stringify(porDefecto));
        } catch(e) { console.log("LocalStorage non accesible"); }
        return porDefecto;
    }

    function mostrarLeaderboardPantalla() {
        const lista = obtenerPuntuaciones();
        const tabla = document.getElementById('leaderboard-table');
        if(!tabla) return;
        tabla.innerHTML = '';
        lista.slice(0, 10).forEach((puesto, i) => {
            let corona = (i === 0) ? '👑 ' : '';
            let color = (i === 0) ? '#ffff00' : (i < 3 ? '#00ff00' : '#fff');
            tabla.innerHTML += `<tr style="color: ${color}">
                <td style="text-align: left; width: 20%; font-size: 1.8vh;">#${i+1}</td>
                <td style="text-align: left; width: 45%;">${corona}${puesto.name}</td>
                <td style="text-align: right; width: 35%;">${puesto.score} pts</td>
            </tr>`;
        });
        document.getElementById('screen-leaderboard').style.display = 'flex';
        estado = 'LEADERBOARD';
    }

    window.irASeleccion = function() {
        document.getElementById('screen-leaderboard').style.display = 'none';
        document.getElementById('selection').style.display = 'flex'; 
        estado = 'SELECCION'; 
        seleccionHabilitada = false;
        setTimeout(() => { seleccionHabilitada = true; }, 400);
    }

    function procesarFinDelJuego(llegóAlFinal = false) {
        if (audio.bg1 && audio.bg1.pause) audio.bg1.pause();
        if (audio.bg2 && audio.bg2.pause) audio.bg2.pause();
        document.getElementById('timer-display').style.display = 'none';
        document.getElementById('score-box').style.display = 'none';
        document.getElementById('gas-box').style.display = 'none';
        document.getElementById('lives-box').style.display = 'none';

        const lista = obtenerPuntuaciones();
        let posicion = lista.findIndex(p => score > p.score);
        if (posicion === -1 && lista.length < 10) posicion = lista.length;

        document.getElementById('go-score').innerText = `${score} PTS`;
        document.getElementById('go-title').innerText = llegóAlFinal ? "¡CONCERTO COMPLETADO!" : "FIN DO XOGO";
        document.getElementById('go-title').style.color = llegóAlFinal ? "#00ff00" : "#ff0000";

        if (posicion !== -1 && posicion < 10) {
            document.getElementById('go-rank-msg').innerHTML = `¡NOVO RÉCORD!<br>ESTÁS NA POSICIÓN <span style="color:#00ff00; font-size:3vh;">#${posicion + 1}</span>`;
            document.getElementById('container-registro').style.display = 'flex';
            document.getElementById('btn-go-action').onclick = function() { guardarPuntuacion(posicion); };
        } else {
            document.getElementById('go-rank-msg').innerText = "NON CONSEGUICHES ENTRAR NO TOP 10. ¡INTÉNTAO DE NOVO!";
            document.getElementById('container-registro').style.display = 'none';
            document.getElementById('btn-go-action').onclick = function() { location.reload(); };
        }

        document.getElementById('screen-gameover').style.display = 'flex';
        estado = 'GAMEOVER';
    }

    function guardarPuntuacion(pos) {
        let inputName = document.getElementById('player-name').value.trim().toUpperCase();
        if (inputName.length === 0) inputName = "AAA";
        while(inputName.length < 3) inputName += "A";

        try {
            let lista = obtenerPuntuaciones();
            lista.splice(pos, 0, { name: inputName, score: score });
            lista = lista.slice(0, 10);
            localStorage.setItem('festival_run_scores', JSON.stringify(lista));
        } catch(e) {}
        location.reload();
    }

    function safePlayAudio(aud) {
        if(aud && aud.play) {
            try { aud.play().catch(()=>{}); } catch(e){}
        }
    }

    function actualizarVidasUI() {
        for(let i=0; i<3; i++) {
            let crossEl = document.getElementById(`cross-${i}`);
            if(crossEl) crossEl.style.display = (i >= vidas) ? 'flex' : 'none';
        }
    }

    window.intentarSeleccion = function(v) {
        if (!seleccionHabilitada) return;
        mostrarTut1(v);
    }

    function mostrarTut1(v) {
        if (v === 'moto') {
            vehiculo = 'motero';
            audio.bg1 = crearAudioSeguro('musica_chucho.mp3');
            audio.bg2 = crearAudioSeguro('musica_fondo.mp3');
        } else {
            vehiculo = 'coche';
            audio.bg1 = crearAudioSeguro('musica_juego.mp3');
            audio.bg2 = crearAudioSeguro('musica_albweto.mp3');
        }
        document.getElementById('selection').style.display = 'none';
        const tut = document.getElementById('tut1');
        tut.style.backgroundImage = `url('tutorial_fase1_${v}.png')`;
        tut.style.display = 'block';
        estado = 'TUTORIAL1';
    }

    window.iniciarJuegoFase1 = function() {
        document.getElementById('tut1').style.display = 'none';
        const timer = document.getElementById('timer-display');
        timer.style.top = '10%'; timer.style.display = 'block';
        document.getElementById('score-box').classList.remove('fase2-ui'); 
        document.getElementById('score-box').style.display = 'block';
        document.getElementById('lives-box').style.display = 'flex';
        document.getElementById('gas-box').style.display = 'none';
        tiempo = 50; f1Finalizado = false; modoPuente = false; carril = 1;
        if(audio.bg1) { audio.bg1.volume = 1; audio.bg1.loop = true; safePlayAudio(audio.bg1); }
        actualizarVidasUI();
        estado = 'JUGANDO_F1';
    }

    function loop() {
        ctx.clearRect(0, 0, GW, GH);
        
        if (estado === 'INICIO') { 
            drawAsset(imgs.intro, 0, 0, GW, GH, "#2c3e50");
            ctx.fillStyle = "#ffffff";
            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.fillText("TOCA PARA EMPEZAR", GW/2, GH - 100);
        }

        if (estado === 'JUGANDO_F1') {
            if (tiempo > 0) scrollY = (scrollY + 14) % GH;
            const bg = modoPuente ? imgs.puente : imgs.muralla;
            
            drawAsset(bg, 0, scrollY - GH, GW, GH, "#34495e");
            drawAsset(bg, 0, scrollY, GW, GH, "#34495e");

            let destinoX = (GW/3)*carril + (GW/6) - player.w/2;
            if (tiempo <= 0) {
                carril = 1; 
                player.x += (destinoX - player.x) * 0.08;
                if(Math.abs(player.x - destinoX) < 10) {
                    player.speedOut += 0.4;
                    player.y -= player.speedOut;
                }
                if (player.y < -player.h && !f1Finalizado) {
                    f1Finalizado = true;
                    setTimeout(finalizarFase1, 800);
                }
            } else {
                player.x += (destinoX - player.x) * 0.25;
            }

            if (frameParpadeo > 0) { frameParpadeo--; if (Math.floor(frameParpadeo / 5) % 2 === 0) ctx.globalAlpha = 0.3; }
            drawAsset(imgs[vehiculo], player.x, player.y, player.w, player.h, "#f1c40f"); 
            ctx.globalAlpha = 1.0;

            for (let i = obstaculos.length - 1; i >= 0; i--) {
                let o = obstaculos[i]; 
                if (tiempo > 0) o.y += 13;
                let tam = (o.tipo === 'guardia') ? 150 : 110;
                let colFall = (o.tipo === 'pollo') ? '#e74c3c' : '#95a5a6';
                drawAsset(imgs[o.tipo], o.x, o.y, tam, tam, colFall);
                
                if (tiempo > 0 && player.x < o.x+tam-30 && player.x+player.w > o.x+30 && player.y < o.y+tam-30 && player.y+player.h > o.y+30) {
                    if(o.tipo === 'pollo') { 
                        score += 100; 
                        safePlayAudio(audio.point); 
                        document.getElementById('score').innerText = score; 
                    } 
                    else { 
                        vidas--; 
                        if(audio.crash) audio.crash.currentTime = 0; 
                        safePlayAudio(audio.crash); 
                        if (navigator.vibrate) navigator.vibrate(200); 
                        frameParpadeo = 40; 
                        actualizarVidasUI(); 
                        if(vidas <= 0) {
                            estado = 'G

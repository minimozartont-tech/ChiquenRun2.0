<!DOCTYPE html> 
<html lang="es">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>ChiquenRun 2.0 - Full Game</title>  
    <style>  
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }  
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 500px; aspect-ratio: 480 / 854; background: #000; overflow: hidden; }  
        canvas { display: block; width: 100%; height: 100%; }  

        #timer-display { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); color: #ffff00; font-size: 6vh; font-weight: bold; text-shadow: 2px 2px #000; display: none; z-index: 10; }  
        .ui-box { position: absolute; bottom: 20px; background: rgba(0,0,0,0.8); border: 2px solid #ffff00; padding: 10px; border-radius: 10px; color: #fff; display: none; z-index: 10; font-size: 2vh; }
        #score-box { left: 20px; }
        #gas-box { right: 20px; }
        #lives-box { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 2px solid #ffff00; padding: 8px; border-radius: 10px; display: none; gap: 5px; z-index: 10; }  
        .vida-icon { width: 3vh; height: auto; }

        #selection { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; text-align: center; }  
        .veh-btn { border: 3px solid #ffff00; padding: 15px; border-radius: 20px; background: rgba(255,255,0,0.1); color: #ffff00; margin: 10px; font-weight: bold; }
        .veh-btn img { height: 12vh; display: block; margin: 10px auto; }
        .video-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; object-fit: contain; }
    </style>
</head>  
<body>  

    <div id="game-container">
        <div id="selection">  
            <h1 style="color:#ffff00">CHIQUEN RUN 2.0</h1>
            <p>AVENIDA DE LUGO</p>
            <div style="display:flex">
                <div onclick="iniciarFase1('motero')" class="veh-btn">MOTO<br><img src="motero.png"></div>  
                <div onclick="iniciarFase1('coche')" class="veh-btn">COCHE<br><img src="coche.png"></div>  
            </div>
        </div>  
        
        <div id="timer-display">50</div>  
        <div id="score-box" class="ui-box">PUNTOS: <span id="score">0</span></div>  
        <div id="gas-box" class="ui-box">GAS: <span id="gas-value">100</span>%</div>
        <div id="lives-box"></div>  

        <canvas id="gameCanvas"></canvas>  
    </div>

    <video id="video-transicion" class="video-overlay" playsinline></video>

<script>  
    const canvas = document.getElementById('gameCanvas');  
    const ctx = canvas.getContext('2d');  
    const GW = 480, GH = 854;
    canvas.width = GW; canvas.height = GH;

    const imgs = {};
    const assets = {
        intro: 'intro.png', motero: 'motero.png', coche: 'coche.png', pollo: 'pollo.png', 
        guardia: 'guardia.png', pizza: 'pizza.png', muralla: 'muralla.png', vida: 'vida.png', 
        puente: 'puente.png', fondoF2: 'fondoentero1.png', moteroF2: 'motero_fase2.png', 
        comida: 'comida.png', bueno: 'bueno.png', malo1: 'malo1.png', malo2: 'malo2.png', veneno: 'veneno.png'
    };
    for (let k in assets) { imgs[k] = new Image(); imgs[k].src = assets[k]; }

    const audio = {
        bg1: new Audio('musica_juego.mp3'), bg2: new Audio('musica_fondo.mp3'),
        crash: new Audio('choque.mp3'), point: new Audio('sonido_pollo.mp3')
    };

    let estado = 'INICIO', vehiculo = 'motero', score = 0, vidas = 3, tiempo = 50, gas = 100;
    let scrollY = 0, carril = 1, obstaculos = [], itemsF2 = [], framesF2 = 0;
    const player = { x: GW/2, y: GH-200, w: 100, h: 140, vy: 0, saltos: 0 };

    function actualizarVidasUI() {
        const box = document.getElementById('lives-box');
        box.innerHTML = '';
        for(let i=0; i<vidas; i++) box.innerHTML += `<img src="vida.png" class="vida-icon">`;
    }

    window.iniciarFase1 = function(v) {
        vehiculo = v;
        document.getElementById('selection').style.display = 'none';
        document.getElementById('timer-display').style.display = 'block';
        document.getElementById('score-box').style.display = 'block';
        document.getElementById('lives-box').style.display = 'flex';
        audio.bg1.play();
        actualizarVidasUI();
        estado = 'JUGANDO_F1';
    }

    function finalizarFase1() {
        estado = 'VIDEO1';
        audio.bg1.pause();
        const vid = document.getElementById('video-transicion');
        vid.src = (vehiculo === 'motero') ? 'moto_final.mp4' : 'coche_final.mp4';
        vid.style.display = 'block'; vid.play();
        vid.onended = () => {
            vid.style.display = 'none';
            iniciarFase2();
        };
    }

    function iniciarFase2() {
        estado = 'JUGANDO_F2';
        document.getElementById('gas-box').style.display = 'block';
        document.getElementById('lives-box').style.display = 'none';
        document.getElementById('timer-display').style.display = 'block';
        tiempo = 50; gas = 100; framesF2 = 0; itemsF2 = [];
        player.y = GH * 0.7;
        audio.bg2.play();
    }

    function loop() {
        ctx.clearRect(0, 0, GW, GH);

        if (estado === 'JUGANDO_F1') {
            scrollY = (scrollY + 12) % GH;
            const bg = (tiempo < 5) ? imgs.puente : imgs.muralla;
            ctx.drawImage(bg, 0, scrollY - GH, GW, GH); ctx.drawImage(bg, 0, scrollY, GW, GH);
            
            let destinoX = (GW/3)*carril + (GW/6) - player.w/2;
            player.x += (destinoX - player.x) * 0.2;
            ctx.drawImage(imgs[vehiculo], player.x, player.y, player.w, player.h);

            obstaculos.forEach((o, i) => {
                o.y += 14;
                ctx.drawImage(imgs[o.tipo], o.x, o.y, 110, 110);
                if (player.x < o.x+80 && player.x+player.w > o.x+20 && player.y < o.y+80 && player.y+player.h > o.y+20) {
                    if(o.tipo === 'pollo') { score+=100; audio.point.play(); } 
                    else { vidas--; audio.crash.play(); if(vidas<=0) location.reload(); }
                    obstaculos.splice(i, 1);
                }
            });

            tiempo -= 1/60;
            document.getElementById('timer-display').innerText = Math.ceil(tiempo);
            document.getElementById('score').innerText = score;
            if(tiempo <= 0) finalizarFase1();
        }

        if (estado === 'JUGANDO_F2') {
            framesF2++;
            let prog = framesF2 / 3000; 
            tiempo = 50 - (prog * 50);
            document.getElementById('timer-display').innerText = Math.ceil(Math.max(0, tiempo));

            // Fondo lateral de escenario
            ctx.drawImage(imgs.fondoF2, -(prog * (imgs.fondoF2.width - GW)), 0, imgs.fondoF2.width, GH);

            // Gravedad para saltar botellas
            player.vy += 0.8; player.y += player.vy;
            if(player.y > GH*0.7) { player.y = GH*0.7; player.vy = 0; player.saltos = 0; }
            ctx.drawImage(imgs.moteroF2, 50, player.y, 120, 160);

            // Generar items de fase 2 (malo1=agua, malo2=zumo, bueno=cerveza)
            if(Math.random() < 0.03) {
                const tipos = ['malo1', 'malo2', 'bueno', 'pollo', 'comida', 'veneno'];
                itemsF2.push({x: GW, y: GH*0.7 + 50, tipo: tipos[Math.floor(Math.random()*tipos.length)]});
            }

            itemsF2.forEach((it, i) => {
                it.x -= 8;
                ctx.drawImage(imgs[it.tipo], it.x, it.y, 80, 80);
                if(50 < it.x+60 && 150 > it.x && player.y < it.y+60 && player.y+160 > it.y) {
                    if(it.tipo === 'bueno' || it.tipo === 'pollo' || it.tipo === 'comida') { 
                        gas = Math.min(100, gas+10); score+=50; 
                    } else { 
                        gas -= 15; audio.crash.play(); 
                    }
                    itemsF2.splice(i, 1);
                }
            });

            gas -= 0.05;
            document.getElementById('gas-value').innerText = Math.floor(gas);
            document.getElementById('score').innerText = score;
            if(gas <= 0) location.reload();
            if(tiempo <= 0) {
                estado = 'VIDEO2';
                audio.bg2.pause();
                const v2 = document.getElementById('video-transicion');
                v2.src = 'concierto.mp4'; v2.style.display = 'block'; v2.play();
                v2.onended = () => location.reload();
            }
        }

        requestAnimationFrame(loop);
    }

    window.addEventListener('touchstart', (e) => {
        if (estado === 'JUGANDO_F1') {
            if(e.touches[0].clientX < window.innerWidth/2) { if(carril > 0) carril--; } 
            else { if(carril < 2) carril++; }
        } else if (estado === 'JUGANDO_F2') {
            if(player.saltos < 2) { player.vy = -18; player.saltos++; }
        }
    });

    setInterval(() => { 
        if(estado === 'JUGANDO_F1') {
            const t = (Math.random() < 0.2) ? 'pollo' : (Math.random() < 0.5 ? 'guardia' : 'pizza');
            obstaculos.push({ x: (GW/3)*Math.floor(Math.random()*3) + (GW/6)-55, y: -100, tipo: t }); 
        } 
    }, 1000);

    loop();
</script>  
</body>  
</html>

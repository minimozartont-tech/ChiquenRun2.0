<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChiquenRun 2.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100%; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Carga de tus imágenes (usando los nombres exactos de tu GitHub)
        const imgPollo = new Image(); imgPollo.src = 'pollo.png';
        const imgMalo = new Image(); imgMalo.src = 'malo1.png';
        const imgFondo = new Image(); imgFondo.src = 'fondoentero1.png';

        let score = 0;
        let gameActive = true;

        // Ajustamos el tamaño del pollo y los enemigos para que no se vea "mezclado"
        const player = { x: canvas.width / 2 - 30, y: canvas.height - 120, w: 60, h: 60 };
        const enemies = [];

        function spawn() {
            if(!gameActive) return;
            enemies.push({ x: Math.random() * (canvas.width - 50), y: -60, w: 60, h: 60, speed: 5 });
        }

        function update() {
            if(!gameActive) return;
            enemies.forEach((en, i) => {
                en.y += en.speed;
                // Colisión simple
                if (player.x < en.x + en.w && player.x + player.w > en.x &&
                    player.y < en.y + en.h && player.y + player.h > en.y) {
                    gameActive = false;
                    alert("¡GAME OVER! Puntos: " + score);
                    location.reload();
                }
                if(en.y > canvas.height) { enemies.splice(i, 1); score++; }
            });
            if (Math.random() < 0.03) spawn();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Dibujar el fondo estirado a la pantalla
            ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);

            // 2. Dibujar tu pollo
            ctx.drawImage(imgPollo, player.x, player.y, player.w, player.h);

            // 3. Dibujar enemigos (malo1.png)
            enemies.forEach(en => ctx.drawImage(imgMalo, en.x, en.y, en.w, en.h));

            // 4. Puntos
            ctx.fillStyle = "white";
            ctx.font = "25px Arial";
            ctx.fillText("Puntos: " + score, 20, 40);

            update();
            requestAnimationFrame(draw);
        }

        canvas.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX - player.w / 2;
        });

        // Arrancar cuando el fondo cargue
        imgFondo.onload = () => { draw(); };
    </script>
</body>
</html>

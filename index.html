<!DOCTYPE html> 
<html lang="es">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>ChiquenRun 2.0 - Edición Definitiva</title>  
    <style>  
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }  
        #game-container { position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden; }  
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }  

        #timer-display { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); color: #ffff00; font-size: 6vh; font-weight: bold; text-shadow: 2px 2px #000; display: none; z-index: 10; }  
        
        .ui-box { position: absolute; bottom: 20px; background: rgba(0,0,0,0.8); border: 2px solid #ffff00; padding: 10px; border-radius: 10px; color: #fff; display: none; z-index: 10; font-size: 2vh; }
        #score-box { left: 20px; }
        #gas-box { right: 20px; }
        
        #lives-box { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 2px solid #ffff00; padding: 8px; border-radius: 10px; display: none; gap: 5px; z-index: 10; }  
        .vida-icon { width: 3vh; height: auto; }

        #selection { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; text-align: center; }  
        .option-container { display: flex; gap: 20px; margin-top: 30px; }
        .veh-btn { border: 3px solid #ffff00; padding: 10px; border-radius: 15px; background: rgba(255,255,0,0.1); color: #ffff00; font-weight: bold; cursor: pointer; }
        .veh-btn img { height: 12vh; display: block; margin: 10px auto; }

        .tutorial-overlay { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #000; z-index: 150; display: none; }  
        .video-overlay { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; object-fit: contain; }
    </style>
</head>  
<body>  

    <div id="game-container">
        <div id="selection">  
            <h2 style="color: #ffff00;">CHIKEN RUN 2.0</h2>
            <p>ELIGE TU VEHÍCULO</p>
            <div class="option-container">
                <div onclick="iniciarFase1('motero')" class="veh-btn">MOTO<br><img src="motero.png"></div>  
                <div onclick="iniciarFase1('coche')" class="veh-btn">COCHE<br><img src="coche.png"></div>  
            </div>
        </div>  
        
        <div id="timer-display">50</div>  
        <div id="score-box" class="ui-box">PUNTOS: <span id="score">0</span></div>  
        <div id="gas-box" class="ui-box">GAS: <span id="gas-value">100</span>%</div>
        <div id="lives-box"></div>  

        <canvas id="gameCanvas"></canvas>  
    </div>

    <video id="video-fase1" class="video-overlay" playsinline muted></video>

<script>  
    const canvas = document.getElementById('gameCanvas');  
    const ctx = canvas.getContext('2d');  
    const GW = 480, GH = 854; // Resolución interna fija para que no se mezcle nada
    canvas.width = GW; canvas.height = GH;

    const assets = {
        intro: 'intro.png', motero: 'motero.png', coche: 'coche.png', pollo: 'pollo.png', 
        guardia: 'guardia.png', pizza: 'pizza.png', muralla: 'muralla.png', vida: 'vida.png', 
        puente: 'puente.png', fondoF2: 'fondoentero1.png', moteroF2: 'motero_fase2.png', 
        comida: 'comida.png', bueno: 'bueno.png', malo1: 'malo1.png', malo2: 'malo2.png', veneno: 'veneno.png'
    };
    const imgs = {};
    for (let k in assets) { imgs[k] = new Image(); imgs[k].src = assets[k]; }

    const audio = {
        bg1: new Audio('musica_juego.mp3'),
        crash: new Audio('choque.mp3'), 
        point: new Audio('sonido_pollo.mp3')
    };

    let estado = 'INICIO', vehiculo = 'motero', score = 0, vidas = 3, tiempo = 50;
    let scrollY = 0, carril = 1, obstaculos = [], gas = 100;
    const player = { x: GW/2, y: GH-200, w: 100, h: 140 };

    function actualizarVidasUI() {
        const box = document.getElementById('lives-box');
        box.innerHTML = '';
        for(let i=0; i<vidas; i++) box.innerHTML += `<img src="vida.png" class="vida-icon">`;
    }

    window.iniciarFase1 = function(v) {
        vehiculo = v;
        document.getElementById('selection').style.display = 'none';
        document.getElementById('timer-display').style.display = 'block';
        document.getElementById('score-box').style.display = 'block';
        document.getElementById('lives-box').style.display = 'flex';
        audio.bg1.loop = true; audio.bg1.play();
        actualizarVidasUI();
        estado = 'JUGANDO_F1';
    }

    function loop() {
        ctx.clearRect(0, 0, GW, GH);

        if (estado === 'INICIO') {
            if(imgs.intro.complete) ctx.drawImage(imgs.intro, 0, 0, GW, GH);
            else { ctx.fillStyle = "blue"; ctx.fillRect(0,0,GW,GH); ctx.fillStyle="white"; ctx.fillText("CARGANDO...", 100, 100); }
        }

        if (estado === 'JUGANDO_F1') {
            // Fondo infinito
            scrollY = (scrollY + 10) % GH;
            ctx.drawImage(imgs.muralla, 0, scrollY - GH, GW, GH);
            ctx.drawImage(imgs.muralla, 0, scrollY, GW, GH);

            // Suavizar movimiento del jugador
            let destinoX = (GW/3)*carril + (GW/6) - player.w/2;
            player.x += (destinoX - player.x) * 0.2;
            ctx.drawImage(imgs[vehiculo], player.x, player.y, player.w, player.h);

            // Obstáculos
            for (let i = obstaculos.length - 1; i >= 0; i--) {
                let o = obstaculos[i]; o.y += 12;
                ctx.drawImage(imgs[o.tipo], o.x, o.y, 100, 100);

                // Colisión
                if (player.x < o.x+80 && player.x+player.w > o.x+20 && player.y < o.y+80 && player.y+player.h > o.y+20) {
                    if(o.tipo === 'pollo' || o.tipo === 'pizza') { 
                        score += 50; audio.point.play(); 
                        document.getElementById('score').innerText = score;
                    } else { 
                        vidas--; audio.crash.play(); 
                        actualizarVidasUI();
                        if(vidas <= 0) location.reload();
                    }
                    obstaculos.splice(i, 1);
                }
                if(o.y > GH) obstaculos.splice(i, 1);
            }
            
            tiempo -= 1/60;
            document.getElementById('timer-display').innerText = Math.ceil(tiempo);
            if(tiempo <= 0) location.reload(); // Por ahora reinicia, luego añadimos fase 2
        }
        requestAnimationFrame(loop);
    }

    window.addEventListener('touchstart', (e) => {
        if (estado === 'INICIO') { 
            document.getElementById('selection').style.display = 'flex'; 
            estado = 'SELECCION'; 
        }
        else if (estado === 'JUGANDO_F1') {
            if(e.touches[0].clientX < window.innerWidth/2) { if(carril > 0) carril--; } 
            else { if(carril < 2) carril++; }
        }
    });

    setInterval(() => { 
        if(estado === 'JUGANDO_F1') {
            const tipos = ['guardia', 'malo1', 'pollo', 'pizza'];
            const t = tipos[Math.floor(Math.random()*tipos.length)];
            obstaculos.push({ 
                x: (GW/3)*Math.floor(Math.random()*3) + (GW/6)-50, 
                y: -100, 
                tipo: t 
            }); 
        } 
    }, 1000);

    loop();
</script>  
</body>  
</html>
